liteflow.rule-source=feature/shelltool/flow.el.xml
liteflow.print-banner=false

# 功能测试默认走 OpenAI 兼容自定义入口，真实 baseUrl/apiKey/model 由环境变量提供：
# - LITEFLOW_AGENT_TEST_BASE_URL
# - LITEFLOW_AGENT_TEST_API_KEY
# - LITEFLOW_AGENT_TEST_MODEL（可选，默认 gpt-4o-mini）
# 缺失任一项时，相关测试通过 Assumptions.assumeTrue 跳过。
liteflow.agent.workspace.root=target/wk/feature_shelltool
liteflow.agent.workspace.auto-create=true
liteflow.agent.shell.mode=disabled
liteflow.agent.defaults.max-iterations=6
liteflow.agent.logging.react-enabled=false
liteflow.agent.skills.enabled=false
